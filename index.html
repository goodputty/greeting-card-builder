<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Card Builder" />
  <title>Card Builder – Portraits by Jun-Yi</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: system-ui, sans-serif;
      background: #FFFBF7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      background: #f0ce5b;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(180,130,0,0.15);
    }
    #header .brand-sub {
      font-size: 9px; font-weight: 800;
      color: rgba(60,40,10,0.55);
      letter-spacing: 3px; text-transform: uppercase;
    }
    #header .brand-title {
      font-size: 20px; font-weight: 900; color: #3a2208;
    }
    #save-btn {
      background: #1c7b1c; color: white;
      font-family: inherit; font-weight: 900; font-size: 14px;
      padding: 11px 22px; border-radius: 40px; border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 8px;
      transition: opacity 0.2s;
    }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #reset-btn {
      background: white; color: #3a2208;
      font-family: inherit; font-weight: 900; font-size: 14px;
      padding: 11px 22px; border-radius: 40px; border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Body ── */
    #body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Left: preview — 50% width, portrait 2:3 ── */
    #preview-col {
      width: 50%; flex-shrink: 0;
      padding: 24px 16px;
      display: flex; align-items: center; justify-content: center;
      box-sizing: border-box;
    }
    #portrait-outer {
      width: 100%;
      max-width: calc((100vh - 66px - 48px) * 2 / 3);
      aspect-ratio: 2 / 3;
      position: relative;
    }
    #portrait-wrap {
      position: absolute; inset: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      transition: background 0.25s;
    }
    #portrait-wrap > img,
    #portrait-wrap > svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    #layer-face, #layer-clothes, #layer-hair, #layer-acc { object-fit: contain; }

    /* ── Right: options ── */
    #options-col {
      width: 50%; flex-shrink: 0;
      overflow-y: auto;
      padding: 20px 20px 40px 14px;
      display: flex; flex-direction: column; gap: 20px;
    }
    #options-col::-webkit-scrollbar { width: 4px; }
    #options-col::-webkit-scrollbar-thumb { background: #f0ce5b; border-radius: 4px; }

    .section-label {
      font-size: 11px; font-weight: 900; color: #3351c6;
      text-transform: uppercase; letter-spacing: 2.5px;
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .section-divider { height: 1px; background: #f0e8dc; margin-top: 6px; }

    /* Thumbnail grid */
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .thumb-btn {
      width: 100%; aspect-ratio: 2 / 3;
      border-radius: 8px; border: 2px solid #e8ddd0;
      background: #F5EFE8;
      cursor: pointer; overflow: hidden; padding: 0;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-btn.none-btn { background: #F8F3EE; }
    .thumb-btn.selected { border: 3px solid #9a8a78; box-shadow: none; }
    .thumb-btn img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
    .thumb-btn .thumb-label { font-size: 7px; color: #C0A888; font-weight: 700; text-align: center; padding: 2px; line-height: 1.3; }
    .thumb-tick { display: none; }

    /* Face thumbnails */
    .face-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .face-btn {
      width: 100%; aspect-ratio: 2 / 3;
      border-radius: 8px; border: 2px solid #e8ddd0;
      background: #F5EFE8;
      cursor: pointer; overflow: hidden; padding: 0;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }
    .face-btn img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
    .face-btn.selected { border: 3px solid #9a8a78; box-shadow: none; }
    .face-btn .thumb-tick { display: none; }

    /* Hair colour swatches */
    .haircolor-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .haircolor-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #e8ddd0;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all 0.15s;
    }
    .haircolor-btn.selected { border: 3px solid #9a8a78; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    /* Text colour — "A" buttons */
    .namecolor-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .namecolor-btn {
      width: 40px; height: 40px; border-radius: 8px;
      border: 2px solid #e8ddd0; background: #F8F3EE;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; font-family: system-ui;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      transition: all 0.15s;
    }
    .namecolor-btn.selected { border: 3px solid #9a8a78; }

    /* Background colour */
    .bgcolor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 5px;
    }
    .bgcolor-btn {
      width: 100%; aspect-ratio: 2 / 3;
      border-radius: 8px; border: 2px solid #e8ddd0;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: all 0.15s;
    }
    .bgcolor-btn.selected { border: 3px solid #9a8a78; }

    /* Text inputs */
    .card-text-input {
      width: 100%; padding: 14px 18px;
      border-radius: 16px; border: 2px solid #e8ddd0;
      font-size: 15px; font-weight: 500;
      font-family: system-ui;
      background: #fff; outline: none;
      caret-color: #c2221b;
      transition: border 0.15s;
    }
    .card-text-input:focus { border-color: #c2221b; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <div class="brand-sub">Portraits by Jun-Yi</div>
    <div class="brand-title">Design your card 🎨</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;margin-left:auto;">
    <button id="reset-btn">🔄 Start over</button>
    <button id="save-btn">⬆️ Save &amp; AirDrop</button>
  </div>
</div>

<div id="body">

  <div id="preview-col">
    <div id="portrait-outer">
      <div id="portrait-wrap">
        <img id="layer-clothes" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="clothes" />
        <img id="layer-face"    style="display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="face" src="images/face-fair.png" />
        <img id="layer-hair"    style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="hair" />
        <img id="layer-acc"     style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="accessory" />

        <!-- Text overlay: recipient name (Lora, all caps) + message (De Lionist) -->
        <svg id="layer-text" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
          <text id="recipient-text"
            x="50%" y="76%"
            text-anchor="middle"
            dominant-baseline="auto"
            font-family="Lora, Georgia, serif"
            font-weight="400"
            letter-spacing="2"
            fill="#2c2420"
          ></text>
          <text id="message-text"
            x="50%" y="87%"
            text-anchor="middle"
            dominant-baseline="auto"
            font-family="De Lionist, Georgia, serif"
            font-weight="400"
            fill="#2c2420"
          ></text>
        </svg>
      </div>
    </div>
  </div>

  <div id="options-col">
    <div>
      <div class="section-label"><span>🎨</span> Face</div>
      <div class="face-grid" id="skin-swatches"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>🎨</span> Hair colour</div>
      <div class="haircolor-row" id="hair-color-swatches"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>💇</span> Hairstyle</div>
      <div class="thumb-grid" id="hair-grid"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>👕</span> Outfit</div>
      <div class="thumb-grid" id="clothes-grid"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>✨</span> Accessory</div>
      <div class="thumb-grid" id="acc-grid"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>✏️</span> Recipient name</div>
      <input id="recipient-input" class="card-text-input" type="text" maxlength="30"
        placeholder="e.g. Sophie"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>💌</span> Personal message</div>
      <input id="message-input" class="card-text-input" type="text" maxlength="60"
        placeholder="Gefeliciteerd!"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>🖊️</span> Text colour</div>
      <div class="namecolor-row" id="name-swatches"></div>
      <div class="section-divider"></div>
    </div>
    <div>
      <div class="section-label"><span>🌈</span> Background</div>
      <div class="bgcolor-grid" id="bg-swatches"></div>
      <div class="section-divider"></div>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
