<!DOCTYPE html>
<!-- v1779867492 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Card Builder" />
  <title>Card Builder – Portraits by Jun-Yi</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blush:       #e8897a;
      --blush-light: #f5d5d0;
      --blush-dark:  #c96b5a;
      --ink:         #2c2420;
      --ink-light:   #6b5c54;
      --ink-faint:   #c4b5ad;
      --border:      #e8ddd8;
      --bg:          #fdfaf8;
      --white:       #ffffff;
      --radius-sm:   8px;
      --radius:      12px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-brand { display: flex; flex-direction: column; }
    .header-sub { font-size: 9px; font-weight: 700; color: var(--ink-faint); letter-spacing: 0.14em; text-transform: uppercase; }
    .header-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-ghost {
      padding: 8px 16px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--white);
      color: var(--ink-light); font-size: 12px; font-family: inherit; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--blush-light); color: var(--blush); }

    .btn-primary {
      padding: 8px 20px; border-radius: 20px; border: none;
      background: var(--blush); color: var(--white);
      font-size: 12px; font-family: inherit; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--blush-dark); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Body ── */
    #body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Left: card preview ── */
    #preview-col {
      width: 46%; flex-shrink: 0;
      background: #f0ebe7;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px 16px;
      gap: 12px;
    }
    #card-outer {
      width: 100%;
      max-width: calc((100vh - 57px - 80px) * 2 / 3);
      aspect-ratio: 2 / 3;
      position: relative;
      filter: drop-shadow(0 8px 32px rgba(44,36,32,0.18));
    }
    #card-wrap {
      position: absolute; inset: 0;
      border-radius: var(--radius); overflow: hidden;
      transition: background 0.25s;
    }
    #card-wrap > img, #card-wrap > svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    #layer-skin, #layer-outfit, #layer-hair, #layer-glasses, #layer-acc { object-fit: contain; }
    #preview-note {
      font-size: 11px; color: var(--ink-faint); font-style: italic; text-align: center;
    }

    /* ── Right: options ── */
    #options-col {
      width: 54%; flex-shrink: 0;
      overflow-y: auto;
      padding: 24px 28px 48px;
      background: var(--white);
    }
    #options-col::-webkit-scrollbar { width: 4px; }
    #options-col::-webkit-scrollbar-thumb { background: var(--blush-light); border-radius: 4px; }

    /* ── Sections ── */
    .pc-section { margin-bottom: 22px; }
    .pc-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pc-label-count { font-size: 10px; color: var(--ink-faint); }
    .pc-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Thumbnail grid ── */
    .pc-option-grid { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Default option item — hair, outfit, accessory */
    .pc-option-item {
      cursor: pointer; border-radius: 10px;
      border: 2px solid var(--border); overflow: hidden;
      transition: all 0.15s; background: #f9f3ef; position: relative;
      display: flex; flex-direction: column; align-items: center;
      width: 68px;
      user-select: none;
    }
    .pc-option-item:hover { border-color: var(--blush-light); }
    .pc-option-item.selected { border-color: var(--blush); background: #fef6f4; }
    .pc-option-item.selected::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(232,137,122,0.06); border-radius: 8px; pointer-events: none;
    }
    .pc-thumb {
      width: 68px; height: 68px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #f9f3ef; flex-shrink: 0;
    }
    .pc-thumb img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
    .pc-thumb.placeholder { color: var(--ink-faint); font-size: 20px; }
    .pc-option-label {
      font-size: 10px; text-align: center; padding: 4px 2px;
      color: var(--ink-light); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
    }

    /* Gender thumbnails */
    #gender-grid .pc-option-item { width: 80px !important; }
    #gender-grid .pc-thumb { width: 80px !important; height: 100px !important; }

    /* ── Circular swatches ── */
    .pc-swatch-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .pc-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; border: 2.5px solid transparent;
      outline: 2px solid transparent; outline-offset: 3px;
      transition: all 0.15s; flex-shrink: 0;
    }
    .pc-swatch:hover { transform: scale(1.1); }
    .pc-swatch.selected { outline-color: var(--blush); }

    /* ── Glasses toggle ── */
    .pc-toggle-row { display: flex; align-items: center; gap: 12px; }
    .toggle-switch {
      position: relative; width: 44px; height: 24px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 24px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-track::before {
      content: ""; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--white); left: 3px; top: 3px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .toggle-switch input:checked + .toggle-track { background: var(--blush); }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; color: var(--ink-light); font-weight: 500; }

    /* ── Text colour row ── */
    .pc-text-color-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pc-text-swatch {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--white);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; font-family: system-ui;
      transition: all 0.15s;
    }
    .pc-text-swatch.selected { border-color: var(--blush); box-shadow: 0 0 0 2px var(--blush-light); }

    /* ── Text inputs ── */
    .pc-text-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: system-ui;
      background: var(--white); color: var(--ink);
      transition: border-color 0.15s; outline: none;
    }
    .pc-text-input:focus { border-color: var(--blush); }
  </style>
  <style>
    #gender-grid .pc-option-item { width: 68px !important; }
    #gender-grid .pc-thumb { width: 68px !important; height: 68px !important; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-brand">
    <span class="header-sub">Portraits by Jun-Yi</span>
    <span class="header-title">Design your card</span>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="reset-btn">Start over</button>
    <button class="btn-primary" id="save-btn">Save &amp; AirDrop</button>
  </div>
</div>

<div id="body">

  <!-- Left: card preview -->
  <div id="preview-col">
    <div id="card-outer">
      <div id="card-wrap">
        <img id="layer-skin"    style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="" />
        <img id="layer-outfit"  style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="" />
        <img id="layer-hair"    style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="" />
        <img id="layer-glasses" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="" />
        <img id="layer-acc"     style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="" />
        <svg id="layer-text" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
          <text id="recipient-text"
            x="50%" y="80%" text-anchor="middle" dominant-baseline="auto"
            font-family="Lora, Georgia, serif" font-weight="400"
            letter-spacing="2" fill="#2c2420"></text>
          <text id="message-text"
            x="50%" y="91%" text-anchor="middle" dominant-baseline="auto"
            font-family="De Lionist, Georgia, serif" font-weight="400"
            fill="#2c2420"></text>
        </svg>
      </div>
    </div>
    <div id="preview-note">Preview only — watermark removed on your final card</div>
  </div>

  <!-- Right: options -->
  <div id="options-col">

    <div class="pc-section">
      <div class="pc-label">Gender</div>
      <div class="pc-option-grid" id="gender-grid"></div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">Skin tone</div>
      <div class="pc-swatch-row" id="skin-grid"></div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">Glasses</div>
      <div class="pc-toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="glasses-toggle" />
          <div class="toggle-track"></div>
        </label>
        <span class="toggle-label" id="glasses-label">No</span>
      </div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">Hair colour</div>
      <div class="pc-swatch-row" id="hair-color-grid"></div>
    </div>

    <div class="pc-section">
      <div class="pc-label">Hairstyle</div>
      <div class="pc-option-grid" id="hair-grid"></div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">Outfit</div>
      <div class="pc-option-grid" id="clothes-grid"></div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">Accessory</div>
      <div class="pc-option-grid" id="acc-grid"></div>
    </div>

    <hr class="pc-divider" />

    <div class="pc-section">
      <div class="pc-label">
        Name of recipient
        <span class="pc-label-count" id="recipient-count">0 / 30</span>
      </div>
      <input class="pc-text-input" id="recipient-input" type="text" maxlength="30"
        placeholder="e.g. Sophie"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
    </div>

    <div class="pc-section">
      <div class="pc-label">
        Personal message
        <span class="pc-label-count" id="message-count">0 / 60</span>
      </div>
      <input class="pc-text-input" id="message-input" type="text" maxlength="60"
        placeholder="e.g. Happy Birthday!"
        autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>

  </div>
</div>

<script src="app.js?v=1779867492"></script>
</body>
</html>
